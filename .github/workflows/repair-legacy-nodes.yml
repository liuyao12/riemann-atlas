name: Repair legacy nodes

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repair-legacy-nodes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Riemann Atlas
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Repair structural node issues
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          function read(p) { return fs.readFileSync(p, 'utf8'); }
          function write(p, s) { fs.writeFileSync(p, s); }
          function replace(p, from, to) {
            const s = read(p);
            if (!s.includes(from)) throw new Error(`Expected text not found in ${p}: ${from}`);
            write(p, s.replace(from, to));
          }

          replace('database/18ACACHZ/18ACACHZ.json', '    "template": "group algebra of {G} over {k}"\n', '    "template": "group algebra of {G} over {k}",\n');
          replace('database/2TQNZ7QF/2TQNZ7QF.json', '    "template": "GL_{n}({R})"\n', '    "template": "GL_{n}({R})",\n');
          replace('database/6DURJW4B/6DURJW4B.json', '"language": "en":,', '"language": "en",');
          replace('database/6DURJW4B/6DURJW4B.json', '"language": "en":,', '"language": "en",');
          replace('database/6DURJW4B/6DURJW4B.json', '"language": "en":,', '"language": "en",');
          replace('database/837UM6FI/837UM6FI.json', '"f": "4CID84AD": "map {U}\\u2192{K}"', '"f": "4CID84AD:map {U}\\u2192{K}"');
          replace('database/8M6CAY2R/8M6CAY2R.json', '    "template": "{m}×{n} matrix over {S}"\n', '    "template": "{m}x{n} matrix over {S}",\n');
          replace('database/7RG754YE/7RG754YE.json', '"A": "8M6CAY2R:{m}×{n} matrix --over {R}"', '"A": "8M6CAY2R:{m}x{n} matrix --over {R}"');
          replace('database/7RG754YE/7RG754YE.json', '"B": "8M6CAY2R:{n}×{p} matrix --over {R}"', '"B": "8M6CAY2R:{n}x{p} matrix --over {R}"');
          replace('database/7RG754YE/7RG754YE.json', '"8M6CAY2R:{m}×{p} matrix --over {R}"', '"8M6CAY2R": "{m}x{p} matrix --over {R}"');
          replace('database/0MSVL02A/0MSVL02A.json', '"defintions"', '"definitions"');
          replace('database/6W16LKYH/6W16LKYH.json', '"definitons"', '"definitions"');

          write('database/9JPJBYCP/9JPJBYCP.json', `{
              "id": "9JPJBYCP",
              "name": "homomorphism of R-algebras",
              "dependencies": {
                  "R": "7R2CT98Y:ring"
              },
              "type": {
                  "1139FRZX": "homomorphism of rings",
                  "3TA01A9S": "homomorphism of modules --over {R}"
              },
              "definitions": {
                  "9JPJBYCP_a": {
                      "language": "en",
                      "dependencies": {
                      },
                      "comment": ""
                  },
                  "9JPJBYCP_b": {
                      "language": "en",
                      "dependencies": {
                          "Alg": "6B87KF3K:category of {R}-algebras",
                          "9E3ZA9F8": "morphism --in {Alg}"
                      },
                      "comment": ""
                  }
              },
              "equivalences": {
              }
          }
          `);

          write('database/thm_template.json', `{
              "id": "AAAA",
              "name": "",
              "type": "theorem",
              "dependencies": {
                  "4E41D57C": "real numbers"
              },
              "statements": {
                  "AAAA_1": {
                      "language": "en",
                      "dependencies": {
                      },
                      "comment": ""
                  }
              },
              "formula": [
              ],
              "proofs": {
                  "AAAA_a": {
                      "language": "en",
                      "dependencies": {
                      },
                      "comment": ""
                  },
                  "AAAA_b": {
                      "language": "en",
                      "dependencies": {
                      },
                      "comment": ""
                  }
              }
          }
          `);

          const readme = read('README.md');
          if (!readme.includes('docs/legacy-node-audit.md')) {
            write('README.md', readme.replace(
              '- `docs/architecture.md` describes the new dependency-as-view direction.\n',
              '- `docs/architecture.md` describes the new dependency-as-view direction.\n- `docs/legacy-node-audit.md` tracks the first pass over the migrated node schema.\n'
            ));
          }

          fs.mkdirSync('docs', { recursive: true });
          write('docs/legacy-node-audit.md', `# Legacy Node Audit

          This audit records the first structural pass over the migrated \`database/\` nodes.

          The original id scheme uses short opaque ids such as \`0G633VZJ\`. These ids are best treated as stable node identifiers rather than semantic names. Human meaning should live in \`name\`, templates, statements, definitions, views, and future aliases.

          ## Current Shape

          - JSON node files: 324
          - Parseable after this pass: 324
          - Markdown files under \`database/\`: 521
          - Definition records: 384
          - Definition records with empty \`comment\`: 340
          - Definition records with no local dependencies: 139

          ## Structural Repairs Made

          - Fixed malformed JSON in several migrated files.
          - Corrected misspelled top-level \`defintions\` and \`definitons\` keys to \`definitions\`.
          - Normalized malformed matrix type metadata in \`7RG754YE\`.
          - Made \`database/thm_template.json\` valid JSON.

          ## Remaining Structural Gaps

          Some references point to ids that are not present as nodes yet:

          - \`S63HRXXC\`: matrix algebra --of order \`{n}\` over \`{R}\`
          - \`0NJKG2T0\`: algebra --over \`{R}\`
          - \`71ZFNGRI\`: object --in \`{C}\`
          - \`9E3ZA9F8\`: morphism --in \`{C}\`
          - \`93SVAXQP\`: endomorphism / endomorphism ring --of \`{V}\`
          - \`5FE9DKX2\`: Borel subalgebra --of \`{g}\`

          Some definition records refer to Markdown files that are not present at the expected path:

          - \`database/0TRS03M6/S63HRXXC_1.md\`
          - \`database/0XWSLPKQ/0XWSLPKQ.md\`
          - \`database/11K55UPI/83R3LTWK_a.md\`
          - \`database/11K55UPI/83R3LTWK_b.md\`
          - \`database/3EFEFC0N/3EFEFC0N.md\`
          - \`database/4CID84AD/4CID84AD.md\`
          - \`database/4IAC0008/4IAC0008.md\`
          - \`database/4P80ZG3D/RDL85FLK_c.md\`
          - \`database/6B2A4HQ9/6B2A4HQ9.md\`
          - \`database/75BT39WI/75BT39WI.md\`

          ## Semantic Completion Plan

          The next pass should not blindly erase dependencies. Existing \`dependencies\` and \`type\` entries often correctly describe the setting of a concept, as in \`dominant integral weight\`. Instead, each node should gradually gain view-level metadata that makes the role of those dependencies explicit.

          Recommended additions:

          - \`legacy\`: notes about migrated fields whose meaning is inherited from the old library.
          - \`views.classical_prerequisites\`: the traditional prerequisite reading of the node.
          - \`views.abstraction\`: whether the node is an abstraction from examples, a setting-specific construction, or a theorem-level statement.
          - \`views.computational\`: when a computational or approximant-based reading exists.
          - \`foundations\`: grounding paths in which the node is intended to be meaningful.

          This keeps the original dependency information while making it only one navigational layer of Riemann Atlas.
          `.replace(/^          /gm, ''));

          function walk(dir) {
            let out = [];
            for (const ent of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, ent.name);
              if (ent.isDirectory()) out = out.concat(walk(p));
              else out.push(p);
            }
            return out;
          }
          const jsonFiles = walk('database').filter(p => p.endsWith('.json'));
          const bad = [];
          for (const p of jsonFiles) {
            try { JSON.parse(read(p).replace(/,\s*([}\]])/g, '$1')); }
            catch (e) { bad.push(`${p}: ${e.message}`); }
          }
          if (bad.length) throw new Error(`JSON validation failed:\n${bad.join('\n')}`);
          NODE

          rm -f .github/workflows/repair-legacy-nodes.yml

      - name: Commit repairs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Repair legacy node structure"
            git push origin HEAD:main
          fi
