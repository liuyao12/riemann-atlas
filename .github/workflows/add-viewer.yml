name: Add viewer prototype

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-viewer.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-viewer:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Riemann Atlas
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install viewer files
        shell: bash
        run: |
          set -euo pipefail
          base64 -d > /tmp/viewer-upload.tar.gz <<'B64'

B64
          tar -xzf /tmp/viewer-upload.tar.gz
          rm -f .github/workflows/add-viewer.yml

      - name: Commit viewer prototype
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add dependency graph viewer prototype"
            git push origin HEAD:main
          fi
