name: Bootstrap from neobourbaki Library

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-from-library.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Riemann Atlas
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy source library and add Riemann Atlas framing
        shell: bash
        run: |
          set -euo pipefail

          git clone --depth 1 https://github.com/neobourbaki/Library.git /tmp/neobourbaki-library
          rm -rf /tmp/neobourbaki-library/.git

          mkdir -p /tmp/riemann-atlas-framing/docs /tmp/riemann-atlas-framing/foundations /tmp/riemann-atlas-framing/views
          cp /tmp/neobourbaki-library/README.md /tmp/riemann-atlas-framing/docs/legacy-neobourbaki-readme.md

          cat > /tmp/riemann-atlas-framing/README.md <<'EOF'
          # Riemann Atlas

          A collaborative atlas of mathematical definitions, theorems, proofs, examples, visualizations, and foundations.

          Riemann Atlas treats dependencies as views rather than as a single forced ontology. A statement may be approached through classical real analysis, computable approximations, formal proof systems, historical motivation, algebraic abstraction, or other foundations.

          This repository begins as a migration of [`neobourbaki/Library`](https://github.com/neobourbaki/Library). The inherited `database/` entries are preserved as source material, while the project direction changes: fields such as `type` and `dependencies` are no longer meant to impose a single foundational spine. They are legacy structural views that will be joined by other views.

          ## First Design Principle

          The same mathematical statement can live at several levels of abstraction.

          For example, the Fundamental Theorem of Calculus may be presented through rational approximation processes, classical real analysis over real numbers, formal proof-system definitions, or later algebraic abstractions. None of these views has to be the root ontology of the whole library.

          ## Repository Shape

          - `database/` preserves the existing migrated library entries.
          - `docs/architecture.md` describes the new dependency-as-view direction.
          - `foundations/` is for rigorous grounding paths such as computable analysis, classical real analysis, and formalized mathematics.
          - `views/` is for navigational layers: prerequisite views, abstraction views, historical views, computational views, and proof-assistant views.
          EOF

          cat > /tmp/riemann-atlas-framing/docs/architecture.md <<'EOF'
          # Architecture Notes

          Riemann Atlas is not organized around one compulsory subtype hierarchy.

          The inherited library mostly records definitions and theorems with `type` and `dependencies` metadata. In this rebuild, that metadata should be understood as one view among many: a useful structural view, but not the only way a mathematical object or statement may be grounded.

          ## Nodes

          A node may represent a definition, theorem, proof, example, construction, visualization, computation, or explanatory note.

          ## Views

          A view is a way of reading the graph. Examples:

          - classical prerequisite view
          - computable approximation view
          - Lean or proof-assistant formalization view
          - historical motivation view
          - abstraction view
          - visualization or interactive map view

          ## Foundations

          A foundation is a rigorous grounding path. The classical set/group/ring/field/real-number route is one foundation. A computable route through natural numbers, rational numbers, algorithms, approximants, and limiting processes is another. A proof assistant formalization is another.

          The goal is to make the active foundation or abstraction level visible whenever a statement is made.
          EOF

          cat > /tmp/riemann-atlas-framing/foundations/README.md <<'EOF'
          # Foundations

          Foundations are rigorous grounding paths for mathematical statements.

          Riemann Atlas should eventually support several foundations side by side, including:

          - computational foundations based on natural numbers, rational numbers, algorithms, approximants, and limits
          - classical real analysis and set-theoretic foundations
          - algebraic abstraction paths such as real numbers to fields to rings to groups
          - proof-assistant foundations such as Lean/mathlib encodings

          A foundation explains how a statement is made precise. It should not automatically become the ontology of the whole atlas.
          EOF

          cat > /tmp/riemann-atlas-framing/views/README.md <<'EOF'
          # Views

          Views are navigational layers over the mathematical graph.

          The same node may participate in many views: prerequisite, abstraction, historical, computational, visual, formal, pedagogical, or research-level. This lets the atlas show where a statement is working without forcing every statement into the same foundational order.
          EOF

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/neobourbaki-library/. .
          cp -a /tmp/riemann-atlas-framing/. .
          rm -f .github/workflows/bootstrap-from-library.yml

      - name: Commit migrated atlas
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Bootstrap Riemann Atlas from Library"
            git push origin HEAD:main
          fi
